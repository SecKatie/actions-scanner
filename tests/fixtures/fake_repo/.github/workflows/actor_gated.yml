name: Actor-gated workflow
on:
  pull_request_target:
    paths:
      - '**/yarn.lock'

jobs:
  generate-changeset:
    runs-on: ubuntu-latest
    # Only runs for bot actor - not exploitable by external attackers
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Run build
        run: npm install
