name: Permission Gated PR Handler

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    outputs:
      has-access: ${{ steps.check.outputs.has-access }}
    steps:
      - uses: actions/github-script@v7
        id: check
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            const hasAccess = ['write', 'admin', 'maintain'].includes(data.permission);
            core.setOutput('has-access', hasAccess);

  build:
    needs: check-permissions
    if: needs.check-permissions.outputs.has-access == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build
        run: npm install && npm run build
