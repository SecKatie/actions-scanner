name: Context Injection Workflow Run
on:
  workflow_run:
    workflows: [Test]
    types: [completed]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Log info
        run: |
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Repo: ${{ github.event.workflow_run.head_repository.full_name }}"
