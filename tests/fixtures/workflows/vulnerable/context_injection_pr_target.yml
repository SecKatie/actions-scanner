name: Context Injection PR Target
on:
  pull_request_target:
    types: [opened, synchronize]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Debug branch info
        run: |
          echo "Branch: ${{ github.head_ref }}"
          echo "Repo: ${{ github.event.pull_request.head.repo.full_name }}"
