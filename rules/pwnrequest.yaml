rules:
  # ---------------------------------------------------------------------------
  # PwnRequest: Dangerous checkout ref in pull_request_target
  # ---------------------------------------------------------------------------
  - id: gha-pwnrequest-dangerous-checkout-ref
    message: >-
      Checkout of attacker-controlled PR code ('${{$REF}}') in a
      pull_request_target workflow. If any build command, local action, or
      script executes after this step, an attacker can achieve arbitrary code
      execution with the privileges of the base repository.
    severity: ERROR
    languages: [yaml]
    metadata:
      category: security
      subcategory:
        - vuln
      technology:
        - github-actions
      vulnerability_type: pwnrequest
      references:
        - https://securitylab.github.com/resources/github-actions-preventing-pwn-requests/
      cwe:
        - "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
    paths:
      include:
        - ".github/workflows/"
    patterns:
      - pattern-inside: |
          on:
            pull_request_target: ...
          ...
      - pattern: |
          uses: actions/checkout@$VER
          with:
            ref: $REF
      - metavariable-regex:
          metavariable: $REF
          regex: .*(github\.event\.pull_request\.head\.ref|github\.event\.pull_request\.head\.sha|github\.event\.pull_request\.merge_commit_sha|github\.head_ref|refs/pull/\$\{\{.*github\.event\.(pull_request\.)?number.*\}\}/(merge|head)|format\s*\(\s*['"]refs/pull/\{0\}/(merge|head)['"]|fromJson\(inputs\.github\)\.event\.pull_request\.head\.(ref|sha)).*

  # ---------------------------------------------------------------------------
  # PwnRequest: Dangerous repository override in pull_request_target
  # ---------------------------------------------------------------------------
  - id: gha-pwnrequest-dangerous-repo-checkout
    message: >-
      Checkout uses the PR author's fork repository ('${{$REPO}}') in a
      pull_request_target workflow. This checks out code from the attacker's
      repository, enabling arbitrary code execution.
    severity: ERROR
    languages: [yaml]
    metadata:
      category: security
      subcategory:
        - vuln
      technology:
        - github-actions
      vulnerability_type: pwnrequest
      cwe:
        - "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
    paths:
      include:
        - ".github/workflows/"
    patterns:
      - pattern-inside: |
          on:
            pull_request_target: ...
          ...
      - pattern: |
          uses: actions/checkout@$VER
          with:
            ...
            repository: $REPO
      - metavariable-regex:
          metavariable: $REPO
          regex: .*(github\.event\.pull_request\.head\.repo\.(full_name|name|clone_url|ssh_url)).*

  # ---------------------------------------------------------------------------
  # PwnRequest: Dangerous git fetch/checkout of PR code
  # ---------------------------------------------------------------------------
  - id: gha-pwnrequest-dangerous-git-checkout
    message: >-
      Manual git command checks out PR code in a pull_request_target workflow.
      This fetches and executes attacker-controlled code from a pull request.
    severity: ERROR
    languages: [yaml]
    metadata:
      category: security
      subcategory:
        - vuln
      technology:
        - github-actions
      vulnerability_type: pwnrequest
      cwe:
        - "CWE-829: Inclusion of Functionality from Untrusted Control Sphere"
    paths:
      include:
        - ".github/workflows/"
    patterns:
      - pattern-inside: |
          on:
            pull_request_target: ...
          ...
      - pattern: |
          run: $CMD
      - metavariable-regex:
          metavariable: $CMD
          regex: (?s).*(git\s+fetch\s+.*pull/.*/(head|merge)|git\s+checkout\s+.*pull/|gh\s+pr\s+checkout).*
